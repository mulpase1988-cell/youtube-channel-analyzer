name: 채널 ID 수집기

on:
  schedule:
    - cron: '0 0 * * 0'   # 매주 일요일 00:00 UTC (08:00 KST)
  workflow_dispatch:
    inputs:
      start_row:
        description: '시작 행번호 (기본: 2)'
        required: false
        default: '2'
      end_row:
        description: '마지막 행번호 (기본: 전체)'
        required: false
        default: ''

jobs:
  collect_ids:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread oauth2client requests
      
      - name: Collect Channel IDs
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          SHEET_NAME: '유튜브보물창고_테스트'
          DATA_TAB_NAME: '데이터'
          START_ROW: ${{ github.event.inputs.start_row || '2' }}
          END_ROW: ${{ github.event.inputs.end_row }}
          REQUEST_TIMEOUT: 15
          MAX_RETRIES: 3
        run: |
          python scripts/collect_channel_ids.py
      
      - name: Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: collect-channel-ids-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
      
      - name: Notify on success
        if: success()
        run: |
          echo "✅ 채널 ID 수집 완료"
