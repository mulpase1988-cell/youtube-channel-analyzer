name: YouTube 채널 분석기

on:
  schedule:
    - cron: '0 1 * * *'   # 매일 01:00 UTC (09:00 KST)
  workflow_dispatch:
    inputs:
      start_row:
        description: '시작 행번호 (기본: 2)'
        required: false
        default: '2'
      end_row:
        description: '마지막 행번호 (기본: 전체)'
        required: false
        default: ''

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies from requirements.txt
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run YouTube Analyzer
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          SHEET_NAME: '유튜브보물창고_테스트'
          DATA_TAB_NAME: '데이터'
          START_ROW: ${{ github.event.inputs.start_row || '2' }}
          END_ROW: ${{ github.event.inputs.end_row }}
          REQUEST_TIMEOUT: 10        # 요청당 10초
          MAX_RETRIES: 2             # 최대 2회 재시도
          BATCH_UPDATE_SIZE: 50      # 50개 셀 단위로 배치 업데이트
          MAX_WORKERS: 3             # 3개 동시 처리
        run: |
          python scripts/analyzer_github.py
        timeout-minutes: 120

      
      - name: Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: analyzer-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
