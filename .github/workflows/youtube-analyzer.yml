name: YouTube 채널 분석기

on:
  schedule:
    - cron: '0 1 * * *'   # 매일 01:00 UTC (09:00 KST)
  workflow_dispatch:
    inputs:
      start_row:
        description: '시작 행번호 (기본: 2)'
        required: false
        default: '2'
      end_row:
        description: '마지막 행번호 (기본: 전체)'
        required: false
        default: ''

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread oauth2client feedparser python-dateutil requests
      
      - name: Run YouTube Analyzer
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          SHEET_NAME: '유튜브보물창고_테스트'
          DATA_TAB_NAME: '데이터'
          RANGE: ${{ github.event.inputs.start_row }}${{ github.event.inputs.end_row != '' && format('-{0}', github.event.inputs.end_row) || '' }}
        run: |
          python scripts/analyzer22.py
