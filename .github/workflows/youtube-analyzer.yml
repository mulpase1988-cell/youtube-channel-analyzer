name: YouTube Analyzer (No API - Complete)

on:
  schedule:
    - cron: '0 1 * * *'  # 매일 UTC 01:00 (한국 시간 오전 10:00)
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # requirements.txt가 있으면 설치
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # [중요] requirements.txt 반영 안 됐을 경우를 대비해 필수 라이브러리 강제 설치
          pip install scrapetube feedparser requests gspread oauth2client
      
      - name: Run YouTube Analyzer
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          SHEET_NAME: '유튜브보물창고_테스트'
          DATA_TAB_NAME: '데이터'
          RANGE: '2-100'
        run: |
          python scripts/analyzer22.py
      
      - name: Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: analyzer-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
