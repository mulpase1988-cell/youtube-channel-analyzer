name: 핫데이터→데이터 이전

on:
  #schedule:
  #  - cron: '30 */6 * * *'  # 핫데이터 수집 30분 후 실행 (하루 4회)
  workflow_dispatch:        # 수동 실행 가능

jobs:
  transfer:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v3

      - name: 🐍 Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 패키지 설치
        run: |
          pip install gspread google-auth

      - name: 🔄 핫데이터 → 데이터 이전
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
        run: |
          python scripts/hot_to_data_transfer.py

      - name: 📊 완료 알림
        if: always()
        run: |
          echo "🎉 핫데이터 → 데이터 이전 완료!"
